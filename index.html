<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- INSTANT REDIRECT -->
    <script>
        /* EDIT THE URL BELOW: Put your YouTube video link here */
        window.location.replace("https://www.youtube.com");
    </script>

    <title>latest video published</title>

    <!-- FACEBOOK / OPEN GRAPH TAGS -->
    <meta property="og:type" content="video.other"> <!-- 'video.other' helps show a play button overlay -->
    <meta property="og:url" content="https://sojib78232.github.io/demo/">
    <meta property="og:title" content="latest video published">
    <meta property="og:description" content="Watch the latest update now on YouTube.">
    
    <!-- This creates the 'www.youtube.com' text -->
    <meta property="og:site_name" content="www.youtube.com">

    <!-- IMAGE TAGS -->
    <meta property="og:image" content="https://raw.githubusercontent.com/sojib78232/demo/main/IMG_20260430_030841_281.jpg">
    <meta property="og:image:secure_url" content="https://raw.githubusercontent.com/sojib78232/demo/main/IMG_20260430_030841_281.jpg">
    <meta property="og:image:width" content="1280">
    <meta property="og:image:height" content="720">

    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black flex items-center justify-center min-h-screen">

    <div class="text-center p-8">
        <div class="animate-pulse mb-4">
            <svg class="w-16 h-16 text-red-600 mx-auto" fill="currentColor" viewBox="0 0 24 24">
                <path d="M19.615 3.184c-3.604-.246-11.631-.245-15.23 0-3.897.266-4.356 2.62-4.385 8.816.029 6.185.484 8.549 4.385 8.816 3.6.245 11.626.246 15.23 0 3.897-.266 4.356-2.62 4.385-8.816-.029-6.185-.484-8.549-4.385-8.816zm-10.615 12.816v-8l8 3.993-8 4.007z"/>
            </svg>
        </div>
        <h1 class="text-white text-xl font-bold">Redirecting to YouTube...</h1>
        <p class="text-gray-400 mt-2">Opening the latest video</p>
    </div>

</body>
</html>
